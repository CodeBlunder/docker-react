name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build development image
        run: docker build -t doccudblunder/docker-react -f Dockerfile.dev .

      - name: Run tests
        run: docker run -e CI=true doccudblunder/docker-react npm test -- --coverage
